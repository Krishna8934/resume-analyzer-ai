<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Resume Bullet Point Improver</title>

<style>

body{
    font-family: Arial, Helvetica, sans-serif;
    background:#f5f6fa;
    text-align:center;
    margin:0;
    padding:0;
}

.title{
    margin-top:40px;
    font-size:28px;
    font-weight:bold;
}

.container{
    width:550px;
    margin:auto;
    margin-top:40px;
    background:white;
    padding:30px;
    border-radius:10px;
    box-shadow:0px 5px 15px rgba(0,0,0,0.1);
}

textarea{
    width:95%;
    height:120px;
    padding:10px;
    border-radius:6px;
    border:1px solid #ccc;
    resize:none;
}

button{
    margin-top:20px;
    padding:12px 25px;
    border:none;
    border-radius:6px;
    background:#6c63ff;
    color:white;
    font-size:14px;
    cursor:pointer;
}

button:hover{
    background:#574fd6;
}

.result-box{
margin-top:25px;
background:#e8f5e9;
padding:15px;
border-radius:6px;
border-left:5px solid #2ecc71;
}

.back{
    margin-top:20px;
    display:block;
    text-decoration:none;
    color:#555;
    font-size:14px;
}

</style>

</head>

<body>

<div class="title">
Resume Bullet Point Improver
</div>

<div class="container">

<form action="/bullet_improver" method="POST">

<textarea name="bullet_point"
placeholder="Example: Worked on a backend system"></textarea>

<br>

<button type="submit">
Improve Bullet
</button>

</form>

{% if improved %}

<div class="result-box">

<h3>Improved Bullet Point</h3>

<p>{{ improved }}</p>

</div>

{% endif %}

<a href="/" class="back">← Back to Home</a>

</div>

</body>
</html>
